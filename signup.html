<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png.ico">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAriy5FJE-wXeP6mqWDxkTlcQoV2UI7bG4",
            authDomain: "elvis-development.firebaseapp.com",
            projectId: "elvis-development",
            storageBucket: "elvis-development.firebasestorage.app",
            messagingSenderId: "24539834469",
            appId: "1:24539834469:web:f0f88f731da760f55d7e8c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.auth = auth;
        window.db = db;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.doc = doc;
        window.setDoc = setDoc;
    </script>
</head>
<body class="auth-page">
    <div class="auth-card signup-container">
        <h2>Sign Up</h2>
        <input type="text" id="fullName" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="signup()">Sign Up</button>
        <p id="message"></p>
        <div class="auth-links">
            <a href="login.html">Back to Login</a>
            <a href="contact.html">Need help? Contact us</a>
        </div>
    </div>
    <footer class="footer">
        <p>© 2026 Elvis Jiagge. All rights reserved. Email: elvisdzidula69@gmail.com • Accra, Ghana</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
